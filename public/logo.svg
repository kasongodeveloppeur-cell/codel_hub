<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06B6D4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3B82F6;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Main background circle -->
  <circle cx="100" cy="100" r="90" fill="url(#logoGradient)" opacity="0.1"/>
  <circle cx="100" cy="100" r="85" fill="url(#logoGradient)" opacity="0.2"/>
  <circle cx="100" cy="100" r="80" fill="url(#logoGradient)" opacity="0.3"/>
  
  <!-- CODEL text -->
  <text x="100" y="110" font-family="Arial, sans-serif" font-size="28" font-weight="bold" text-anchor="middle" fill="url(#logoGradient)" filter="url(#glow)">
    CODEL
  </text>
  
  <!-- Code brackets -->
  <path d="M40 80 L30 90 L30 110 L40 120" stroke="url(#logoGradient)" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M160 80 L170 90 L170 110 L160 120" stroke="url(#logoGradient)" stroke-width="3" fill="none" stroke-linecap="round"/>
  
  <!-- Inner code icon -->
  <rect x="85" y="60" width="30" height="4" rx="2" fill="url(#logoGradient)"/>
  <rect x="75" y="70" width="50" height="4" rx="2" fill="url(#logoGradient)" opacity="0.7"/>
  <rect x="80" y="80" width="40" height="4" rx="2" fill="url(#logoGradient)" opacity="0.5"/>
</svg>
